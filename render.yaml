services:
  - type: web
    name: zhimianxing-operation-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install
    startCommand: node server/index.js
    envVars:
      - key: MYSQL_HOST
        sync: false
      - key: MYSQL_USER
        sync: false
      - key: MYSQL_PASSWORD
        sync: false
      - key: MYSQL_DB
        value: zhimianxing
      - key: JAVA_API_BASE_URL
        sync: false
      - key: CORS_ORIGINS
        value: "*"
      - key: JWT_SECRET
        generateValue: true
